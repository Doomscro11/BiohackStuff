name: Reclaim Pack CI

on:
  push:
    branches: [main, develop, feature/patentpulse]
    paths:
      - 'backend/jobs/reclaim_pack_generator.py'
      - 'backend/routes/**reclaim*.py'
      - 'backend/models/reclaim_pack.py'
      - 'backend/tests/**reclaim*.py'
      - 'frontend/**/*Reclaim*'
      - 'frontend/tests/**/*reclaim*.spec.ts'
      - '.github/workflows/reclaim-pack-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/jobs/reclaim_pack_generator.py'
      - 'backend/routes/**reclaim*.py'
      - 'backend/models/reclaim_pack.py'
      - 'backend/tests/**reclaim*.py'
      - 'frontend/**/*Reclaim*'
      - 'frontend/tests/**/*reclaim*.spec.ts'
      - '.github/workflows/reclaim-pack-ci.yml'
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      MONGO_URL: mongodb://localhost:27017
      DB_NAME: peptimancer_test_db
      FEATURE_PATENTPULSE_RECLAIM: "true"
      RECLAIM_EXPORT_DIR: /tmp/test-exports
      PYTHONPATH: ${{ github.workspace }}/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio

      - name: Run reclaim pack tests when present
        run: |
          cd backend
          mkdir -p /tmp/test-exports
          if [ -f "tests/test_reclaim_pack.py" ]; then
            pytest tests/test_reclaim_pack.py -q --tb=short
          else
            echo "No backend reclaim pack test file present; skipping backend reclaim test shard."
          fi

      - name: Upload sample exports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reclaim-pack-debug-artifacts
          path: /tmp/test-exports/
          retention-days: 7

  frontend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    env:
      CI: false
      REACT_APP_BACKEND_URL: http://localhost:8001
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: yarn install --non-interactive --ignore-scripts

      - name: Run reclaim unit tests when present
        run: |
          if [ -f "tests/unit/reclaim_pack_api.spec.ts" ]; then
            yarn test:reclaim:unit --runInBand
          else
            echo "No frontend reclaim unit test file present; skipping frontend reclaim test shard."
          fi
