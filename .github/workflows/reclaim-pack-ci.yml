name: Reclaim Pack CI

# Quarantined during release-gate stabilization.
# This legacy workflow contains stale path assumptions and soft-fail checks.
# The canonical PR gate is .github/workflows/release-gate.yml.
on:
  workflow_dispatch:

jobs:
  reclaim-pack-manual-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: pip
        cache-dependency-path: backend/requirements.txt
    
    - name: Install backend dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio
    
    - name: Run reclaim pack tests if present
      env:
        MONGO_URL: mongodb://localhost:27017
        DB_NAME: peptimancer_test_db
        FEATURE_PATENTPULSE_RECLAIM: true
        RECLAIM_EXPORT_DIR: /tmp/test-exports
        PYTHONPATH: ${{ github.workspace }}/backend
      run: |
        cd backend
        mkdir -p /tmp/test-exports
        if [ -f "tests/test_reclaim_pack.py" ]; then
          pytest tests/test_reclaim_pack.py -v
        else
          echo "No reclaim pack test file present. Manual workflow complete."
        fi
