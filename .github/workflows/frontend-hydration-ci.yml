name: Frontend Hydration CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-hydration-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-hydration-ci.yml'
  workflow_dispatch:

jobs:
  hydration-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    env:
      CI: false
      REACT_APP_BACKEND_URL: http://localhost:8001
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: yarn install --non-interactive --ignore-scripts

      - name: Run hydration audit
        run: yarn audit:hydration

      - name: Upload hydration artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-hydration-artifacts
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7
