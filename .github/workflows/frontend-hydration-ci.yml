name: Frontend Hydration CI

# Quarantined during release-gate stabilization.
# This legacy workflow contains soft-fail checks and old preview-era assumptions.
# The canonical PR gate is .github/workflows/release-gate.yml.
on:
  workflow_dispatch:

jobs:
  hydration-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    defaults:
      run:
        working-directory: frontend
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'yarn'
        cache-dependency-path: frontend/yarn.lock
    
    - name: Install dependencies
      run: yarn install --frozen-lockfile
    
    - name: Build frontend
      run: yarn build
      env:
        CI: true
        REACT_APP_BACKEND_URL: http://localhost:8001
    
    - name: Run hydration audit if configured
      run: |
        if [ -f scripts/hydration_audit.ts ]; then
          yarn audit:hydration
        else
          echo "No hydration audit script present."
        fi
      env:
        REACT_APP_FRONTEND_URL: http://localhost:3000
