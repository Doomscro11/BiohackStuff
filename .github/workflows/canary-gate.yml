name: PatentPulse Canary Gate

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Verification environment'
        required: true
        default: 'canary'
        type: choice
        options:
          - canary
          - production
  push:
    branches: [feature/patentpulse]
    paths:
      - 'backend/routes_patentpulse.py'
      - 'backend/jobs/patentpulse_collector.py'
      - 'frontend/src/pages/PatentPulsePage.tsx'
      - '.github/workflows/canary-gate.yml'

jobs:
  verify-canary:
    name: Verify Canary Readiness
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      API_BASE_URL: ${{ secrets.CANARY_API_URL }}
      MONGO_URI: ${{ secrets.MONGO_URI }}
      DB_NAME: peptimancer_db
      FEATURE_FLAG_NAME: FEATURE_PATENTPULSE
      FEATURE_FLAG_EXPECTED: "true"
      P95_MAX_MS: 900
      ERROR_RATE_MAX: 0.02
      EXPECT_MIN_ITEMS: 27
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install verifier dependencies
        run: python -m pip install --upgrade pip requests pymongo

      - name: Run post-deploy verifier
        id: verify
        run: |
          python backend/jobs/post_deploy_verifier.py > verification_output.txt 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Upload verification results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-results
          path: verification_output.txt
          retention-days: 7

      - name: Enforce verification status
        if: steps.verify.outputs.exit_code != '0'
        run: |
          cat verification_output.txt
          echo "Canary verification failed. Promotion, rollback, tagging, and production mutation are manual-only."
          exit 1

      - name: Create job summary
        if: always()
        run: |
          echo "## PatentPulse Canary Verification" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Environment: ${{ github.event.inputs.environment || 'canary' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Exit code: ${{ steps.verify.outputs.exit_code }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Promotion, rollback, tagging, and production mutation are manual-only." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat verification_output.txt >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
