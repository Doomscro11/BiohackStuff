name: PatentPulse Collector CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/jobs/patentpulse_*.py'
      - 'backend/models/patentpulse.py'
      - 'backend/tests/test_patentpulse_collector.py'
      - '.github/workflows/collector-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/jobs/patentpulse_*.py'
      - 'backend/models/patentpulse.py'
      - 'backend/tests/test_patentpulse_collector.py'
      - '.github/workflows/collector-ci.yml'
  workflow_dispatch:

jobs:
  test-collector:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      MONGO_URL: mongodb://localhost:27017
      DB_NAME: peptimancer_test_db
      PYTHONPATH: ${{ github.workspace }}/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio

      - name: Run collector tests
        run: |
          cd backend
          pytest tests/test_patentpulse_collector.py -q --tb=short
