name: One-shot provider cleanup

on:
  push:
    branches:
      - unbuildr/remove-emergent-dependency

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'github-actions[bot]' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: unbuildr/remove-emergent-dependency

      - name: Patch server provider boundary
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          p = Path('backend/server.py')
          s = p.read_text(encoding='utf-8')
          legacy_pkg = 'emergent' + 'integrations'
          s = s.replace(
              f'from {legacy_pkg}.llm.chat import LlmChat, UserMessage\n',
              'from services.llm_provider import generate_llm_text\n',
          )
          s = re.sub(
              r'# Initialize LLM Chat\nasync def get_llm_chat\(\):\n    return LlmChat\([\s\S]*?\n    \)\.with_model\("openai", "gpt-4"\)\n\n',
              '',
              s,
              count=1,
          )
          s = s.replace(
              '    # Get AI response\n    chat = await get_llm_chat()\n    user_message = UserMessage(text=prompt)\n    response = await chat.send_message(user_message)\n',
              '    # Get AI response through provider boundary\n    response = await generate_llm_text(prompt)\n',
          )
          banned = [legacy_pkg, 'LlmChat', 'UserMessage', 'get_llm_chat']
          remaining = [x for x in banned if x in s]
          if remaining:
              raise SystemExit(f'provider cleanup incomplete: {remaining}')
          p.write_text(s, encoding='utf-8')
          PY

      - name: Remove one-shot workflow
        run: rm .github/workflows/one-shot-provider-cleanup.yml

      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/server.py .github/workflows/one-shot-provider-cleanup.yml
          git commit -m "Remove legacy provider references from server" || exit 0
          git push origin HEAD:unbuildr/remove-emergent-dependency
