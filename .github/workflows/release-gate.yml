name: Release Gate

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ refactor/monorepo-structure ]
  workflow_dispatch:

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      MONGO_URL: mongodb://localhost:27017
      DB_NAME: peptimancer_test_db
      JWT_SECRET: release-gate-test-secret-change-in-prod
      ADMIN_EMAILS: admin@peptimancer.com
      ENABLE_DEMO_OTP: "true"
      DEMO_MODE: "true"
      ENV: development
      PARTNER_SIGNING_SECRET: release-gate-partner-secret
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      REACT_APP_BACKEND_URL: http://localhost:8001
      PYTHONPATH: ${{ github.workspace }}/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio

      - name: Check backend dependency consistency
        run: pip check

      - name: Ensure external Emergent package is not installed
        run: |
          python - <<'PY'
          import importlib.metadata
          import sys

          try:
              importlib.metadata.version('emergentintegrations')
          except importlib.metadata.PackageNotFoundError:
              print('external emergentintegrations package not installed')
              sys.exit(0)

          print('external emergentintegrations package must not be installed')
          sys.exit(1)
          PY

      - name: Import backend app
        run: python -c "import server; print('backend import ok')"

      - name: Run backend tests
        run: pytest -q

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: frontend

    env:
      CI: false
      REACT_APP_BACKEND_URL: http://localhost:8001

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: Build frontend
        run: yarn build

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend

    env:
      CI: true
      REACT_APP_BACKEND_URL: http://localhost:8001

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: Run frontend tests
        run: yarn test --watchAll=false --passWithNoTests

  release-gate:
    name: Release gate summary
    runs-on: ubuntu-latest
    needs: [ backend-tests, frontend-build, frontend-tests ]
    if: always()
    steps:
      - name: Enforce all required jobs passed
        run: |
          if [ "${{ needs.backend-tests.result }}" != "success" ]; then
            echo "Backend tests failed: ${{ needs.backend-tests.result }}"
            exit 1
          fi
          if [ "${{ needs.frontend-build.result }}" != "success" ]; then
            echo "Frontend build failed: ${{ needs.frontend-build.result }}"
            exit 1
          fi
          if [ "${{ needs.frontend-tests.result }}" != "success" ]; then
            echo "Frontend tests failed: ${{ needs.frontend-tests.result }}"
            exit 1
          fi
          echo "Release gate passed."
